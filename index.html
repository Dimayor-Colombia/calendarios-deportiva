<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIMAYOR · Board de Partidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#05070d;
    --bg-1:#0a1224;
    --bg-2:#0f1c3a;
    --line:rgba(255,255,255,0.08);
    --text-hi:#f5f7ff;
    --text-lo:#8a92ad;
    --yellow:#f3cc23;
    --green:#3bad4c;
    --red:#e6483c;
    --card-bg:rgba(255,255,255,0.035);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 15% -10%, rgba(6,42,99,0.55), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(243,204,35,0.06), transparent 55%),
      var(--bg-0);
    color:var(--text-hi);
    font-family:'Barlow', sans-serif;
    min-height:100%;
    padding-bottom:60px;
  }
  h1,h2,h3,.num,.matchTime,.dayName{font-family:'Barlow Condensed', sans-serif;}

  /* ---------- Header / ticker ---------- */
  header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, rgba(5,7,13,0.98), rgba(5,7,13,0.9));
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  .headerTop{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 26px 6px;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--yellow);
    box-shadow:0 0 12px var(--yellow); animation:pulse 1.6s infinite;}
  .brand h1{font-size:22px; font-weight:700; letter-spacing:0.5px; margin:0; text-transform:uppercase;}
  .brand h1 span{color:var(--yellow);}
  .clock{font-size:14px; color:var(--text-lo); letter-spacing:0.5px; text-align:right;}
  .clock b{color:var(--text-hi); font-variant-numeric: tabular-nums;}

  .ticker{
    display:flex; gap:6px; padding:10px 20px 16px; overflow-x:auto;
  }
  .tickerDay{
    flex:1 1 0; min-width:96px;
    text-align:center; padding:8px 6px 9px;
    border-radius:10px; border:1px solid transparent;
    color:var(--text-lo); cursor:default;
    transition:all .25s ease;
  }
  .tickerDay .wd{font-family:'Barlow Condensed'; font-weight:600; font-size:13px; letter-spacing:1.5px; text-transform:uppercase;}
  .tickerDay .dt{font-size:11px; opacity:.75;}
  .tickerDay.today{
    background:linear-gradient(180deg, rgba(243,204,35,0.16), rgba(243,204,35,0.04));
    border-color:rgba(243,204,35,0.55);
    color:var(--yellow);
  }
  .tickerDay .cnt{display:block; font-size:11px; margin-top:2px; color:inherit; opacity:.8;}

  /* ---------- Layout ---------- */
  main{max-width:1180px; margin:0 auto; padding:22px 20px 0;}

  .heroLabel{
    display:flex; align-items:baseline; gap:10px; margin:4px 0 14px;
  }
  .heroLabel .eyebrow{font-size:12px; letter-spacing:3px; color:var(--yellow); text-transform:uppercase; font-weight:600;}
  .heroLabel h2{font-size:30px; margin:0; text-transform:uppercase; letter-spacing:0.5px;}
  .heroLabel .sub{color:var(--text-lo); font-size:14px;}

  .heroGrid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
    gap:14px; margin-bottom:34px;
  }

  .emptyState{
    border:1px dashed var(--line); border-radius:14px; padding:34px;
    text-align:center; color:var(--text-lo); font-size:15px;
  }

  .weekSection{margin-bottom:10px;}
  .weekDayRow{
    border-top:1px solid var(--line); padding:14px 0;
    display:grid; grid-template-columns:140px 1fr; gap:18px;
  }
  .weekDayRow .dayName{font-size:20px; text-transform:uppercase; color:var(--text-hi); letter-spacing:0.5px;}
  .weekDayRow .dayName small{display:block; font-family:'Barlow'; font-size:12px; color:var(--text-lo); font-weight:400;}
  .weekMatches{display:flex; flex-direction:column; gap:8px;}

  /* ---------- Match card ---------- */
  .match{
    position:relative; background:var(--card-bg);
    border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; display:flex; align-items:center; gap:12px;
    border-left:4px solid var(--comp-color, #444);
    transition:transform .15s ease, background .2s ease;
  }
  .heroGrid .match{padding:16px;}
  .match.finalizado{opacity:.5;}
  .match .logo{width:26px; height:26px; object-fit:contain; flex:0 0 auto; border-radius:4px;}
  .match .info{flex:1; min-width:0;}
  .match .comp{font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-lo); margin-bottom:2px;}
  .match .title{font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .heroGrid .match .title{font-size:17px;}
  .match .status{flex:0 0 auto; text-align:right; font-family:'Barlow Condensed'; min-width:78px;}
  .match .kickoff{font-size:20px; font-weight:700; font-variant-numeric:tabular-nums;}
  .weekDayRow .match .kickoff{font-size:16px;}

  .badge{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:700; letter-spacing:1px;
    padding:3px 8px; border-radius:20px; text-transform:uppercase;
  }
  .badge.live{background:rgba(230,72,60,0.16); color:#ff6a5c;}
  .badge.live .dot{width:6px;height:6px;border-radius:50%;background:#ff6a5c; animation:pulse 1s infinite;}
  .badge.done{background:rgba(255,255,255,0.06); color:var(--text-lo);}

  .progress{height:3px; border-radius:3px; background:rgba(255,255,255,0.08); margin-top:8px; overflow:hidden;}
  .progress i{display:block; height:100%; background:#ff6a5c;}

  footer{
    max-width:1180px; margin:30px auto 0; padding:14px 20px 30px;
    display:flex; justify-content:space-between; color:var(--text-lo); font-size:12px;
    border-top:1px solid var(--line);
  }
  footer button{
    background:transparent; border:1px solid var(--line); color:var(--text-lo);
    padding:6px 12px; border-radius:8px; font-family:inherit; cursor:pointer;
  }
  footer button:hover{color:var(--text-hi); border-color:var(--text-hi);}

  @keyframes pulse{
    0%,100%{opacity:1;} 50%{opacity:.35;}
  }
  @media (max-width:640px){
    .weekDayRow{grid-template-columns:1fr; gap:6px;}
    .ticker{gap:4px;}
    .tickerDay{min-width:60px; padding:6px 3px;}
    .tickerDay .wd{font-size:11px;}
  }
</style>
</head>
<body>

<header>
  <div class="headerTop">
    <div class="brand">
      <span class="dot"></span>
      <h1>DIMAYOR <span>· BOARD</span></h1>
    </div>
    <div class="clock">Hoy es <b id="clockDate">--</b> · <b id="clockTime">--:--:--</b></div>
  </div>
  <div class="ticker" id="ticker"></div>
</header>

<main>
  <div class="heroLabel">
    <span class="eyebrow">Hoy</span>
    <h2 id="heroTitle">Partidos del día</h2>
    <span class="sub" id="heroSub"></span>
  </div>
  <div class="heroGrid" id="heroGrid">
    <div class="emptyState">Cargando calendarios…</div>
  </div>

  <div class="weekSection" id="weekSection"></div>
</main>

<footer>
  <span id="statusLine">Iniciando…</span>
  <button id="refreshBtn">Actualizar ahora</button>
</footer>

<script>
/* =========================================================
   CONFIGURACIÓN
   ========================================================= */
const CONFIG = {
  // 1) Crea una API key en https://console.cloud.google.com/ (habilita "Google Calendar API")
  // 2) Cada calendario de CALENDARS debe estar compartido como
  //    "Disponible públicamente" (ver detalles de eventos) en su configuración de Google Calendar.
  API_KEY: 'AIzaSyC2oQ0Y7RYZX_lgkgPIchochLltCnN78nc',
  TIMEZONE: 'America/Bogota',
  DAYS_AHEAD: 7,                 // cuántos días (incl. hoy) se muestran
  REFRESH_EVENTS_MS: 3 * 60 * 1000,   // cada cuánto se vuelve a consultar Google Calendar
  TICK_MS: 20 * 1000,                 // cada cuánto se recalculan los estados (en vivo/finalizado)
  MATCH_DURATION_MIN: 130,            // duración asumida si el evento no trae hora de fin real
  RELOAD_AT_MIDNIGHT: true            // recarga completa la página al cambiar de día
};

const CALENDARS = [
  { id: 'c_74d60f90f8e2a5d566429af24fd4c5e4c6a083e5a62027cec34a5c362b8dd49a@group.calendar.google.com', label: 'Liga BetPlay Dimayor', color: '#f3cc23', logo: 'https://lh3.googleusercontent.com/d/1tVCRbR0BNTcSqzoDd0jgs_9dvrvYK2pX' },
  { id: 'c_b440f465efac86a96197d6c92dcdc371f00f55c22b201b5e4bdb446aa1d558e0@group.calendar.google.com', label: 'Torneo BetPlay Dimayor', color: '#6fb2e3', logo: 'https://lh3.googleusercontent.com/d/1t64NZwLCkCo4ofMZVYzhfcV8pSsVwCfv' },
  { id: 'c_f4e132b3db024af62da58634ae149e2baabbe282f113c0f7d9ddea1ffe67d42f@group.calendar.google.com', label: 'Copa BetPlay Dimayor', color: '#3bad4c', logo: 'https://lh3.googleusercontent.com/d/1TELaujxqcd_Q_I3HwUxriPuUuwOx2Wrl' },
  { id: 'c_d95f7411f89d37a29d9135d9b963cb157e2c0e8ca5971cfe34320415fa6d9254@group.calendar.google.com', label: 'Superliga BetPlay Dimayor', color: '#062a63', logo: 'https://lh3.googleusercontent.com/d/1UJxk_10wBGXLNs5_gaVFI6xmUkT47uYq' },
  { id: 'c_4317288379f78b336a1509f4f6f678aad84d2b08c72797d268346ea2122beb79@group.calendar.google.com', label: 'Liga Femenina BetPlay Dimayor', color: '#b51a65', logo: 'https://lh3.googleusercontent.com/d/1GRGoELSTVM2sDydzsswzi6XvjCDxK84y' },
  { id: 'c_c51065fa3d2f6c30997d0480ee6168233541fa6d80f79e989c70649a83655fad@group.calendar.google.com', label: 'Otras competiciones', color: '#9aa0ad', logo: 'https://lh3.googleusercontent.com/d/1nAOaOA7FCdprzPq6LBwuqTEHVEAQpRzU' },
  { id: 'c_b9881758c97c62967ca1e1638d560af12815ed0262b6bf7d7afc2d910b7cf03a@group.calendar.google.com', label: 'CONMEBOL Libertadores', color: '#c9a227', logo: 'https://lh3.googleusercontent.com/d/1iRkeR307HOxDvVcV8u_IKMkZ3_b0GAye' },
  { id: 'c_353a23183eccc44a15047f4aa971ca96526a53f16170a1b69e0357d2c324c10c@group.calendar.google.com', label: 'CONMEBOL Sudamericana', color: '#c23b3b', logo: 'https://lh3.googleusercontent.com/d/1rJQeeoIs9SMrNyuLhVvJCFOtgR9Hq5FE' },
  { id: '4de747g9v5rqo0ohmj87j4sf1fg9m2c8@import.calendar.google.com', label: 'Copa Mundial de la FIFA 2026', color: '#2fb8a6', logo: 'https://lh3.googleusercontent.com/d/1Td-x8UWchJUcFPqIPhxfYJlWzpvF6t9u' }
];

/* =========================================================
   HELPERS DE FECHA (todo en America/Bogota)
   ========================================================= */
const WD_MAP = { Mon:0, Tue:1, Wed:2, Thu:3, Fri:4, Sat:5, Sun:6 };
const WD_NAMES = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function bogotaNow(){
  return new Date(new Date().toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE }));
}
function dateKeyBogota(d){
  return new Date(d).toLocaleDateString('en-CA', { timeZone: CONFIG.TIMEZONE }); // YYYY-MM-DD
}
function weekdayIndexBogota(d){
  const short = new Date(d).toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE, weekday:'short' });
  return WD_MAP[short];
}
function fmtTime(d){
  return new Date(d).toLocaleTimeString('es-CO', { timeZone: CONFIG.TIMEZONE, hour:'2-digit', minute:'2-digit', hour12:false });
}
function fmtDayShort(d){
  const dt = new Date(d);
  const day = dt.toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE, day:'2-digit' });
  const monthIdx = Number(dt.toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE, month:'numeric' })) - 1;
  return `${day} ${MESES[monthIdx]}`;
}

// Construye los próximos DAYS_AHEAD días reales a partir de "hoy" (rotación natural del calendario)
function buildDayList(){
  const now = bogotaNow();
  const days = [];
  for(let i=0;i<CONFIG.DAYS_AHEAD;i++){
    const d = new Date(now);
    d.setDate(d.getDate()+i);
    days.push({
      key: dateKeyBogota(d),
      wdIndex: weekdayIndexBogota(d),
      label: WD_NAMES[weekdayIndexBogota(d)],
      shortDate: fmtDayShort(d),
      isToday: i===0
    });
  }
  return days;
}

/* =========================================================
   CARGA DE EVENTOS DESDE GOOGLE CALENDAR
   ========================================================= */
async function fetchCalendarEvents(cal, timeMinISO, timeMaxISO){
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events`
    + `?key=${encodeURIComponent(CONFIG.API_KEY)}`
    + `&singleEvents=true&orderBy=startTime`
    + `&timeMin=${encodeURIComponent(timeMinISO)}`
    + `&timeMax=${encodeURIComponent(timeMaxISO)}`
    + `&timeZone=${encodeURIComponent(CONFIG.TIMEZONE)}`;
  const res = await fetch(url);
  if(!res.ok){
    const body = await res.text().catch(()=> '');
    throw new Error(`${cal.label}: HTTP ${res.status} ${body.slice(0,120)}`);
  }
  const data = await res.json();
  return (data.items || [])
    .filter(ev => ev.status !== 'cancelled')
    .map(ev => ({
      id: ev.id,
      title: ev.summary || 'Partido',
      startISO: ev.start.dateTime || ev.start.date,
      endISO: ev.end ? (ev.end.dateTime || null) : null,
      allDay: !ev.start.dateTime,
      cal
    }));
}

async function fetchAllEvents(){
  const now = bogotaNow();
  const timeMin = new Date(now); timeMin.setHours(0,0,0,0);
  const timeMax = new Date(now); timeMax.setDate(timeMax.getDate()+CONFIG.DAYS_AHEAD); timeMax.setHours(23,59,59,999);

  const results = await Promise.allSettled(
    CALENDARS.map(cal => fetchCalendarEvents(cal, timeMin.toISOString(), timeMax.toISOString()))
  );

  const events = [];
  const errors = [];
  results.forEach((r, idx) => {
    if(r.status === 'fulfilled') events.push(...r.value);
    else errors.push(CALENDARS[idx].label + ': ' + r.reason.message);
  });
  return { events, errors };
}

/* =========================================================
   ESTADO DE PARTIDO
   ========================================================= */
function matchStatus(ev){
  const start = new Date(ev.startISO);
  const end = ev.endISO ? new Date(ev.endISO) : new Date(start.getTime() + CONFIG.MATCH_DURATION_MIN*60000);
  const now = new Date();
  if(ev.allDay) return { state:'programado', start, end, pct:0 };
  if(now < start) return { state:'programado', start, end, pct:0 };
  if(now >= start && now < end) return { state:'en_vivo', start, end, pct: Math.min(100, ((now-start)/(end-start))*100) };
  return { state:'finalizado', start, end, pct:100 };
}

/* =========================================================
   RENDER
   ========================================================= */
let CACHE = { events: [] };

function renderTicker(days){
  const el = document.getElementById('ticker');
  el.innerHTML = days.map(d => {
    const count = CACHE.events.filter(e => dateKeyBogota(e.startISO) === d.key).length;
    return `<div class="tickerDay ${d.isToday ? 'today':''}">
      <div class="wd">${d.label.slice(0,3)}</div>
      <div class="dt">${d.shortDate}</div>
      <span class="cnt">${count} partido${count===1?'':'s'}</span>
    </div>`;
  }).join('');
}

function matchCardHTML(ev, big){
  const st = matchStatus(ev);
  let statusHTML;
  if(st.state === 'en_vivo'){
    statusHTML = `<span class="badge live"><span class="dot"></span>En vivo</span>`;
  } else if(st.state === 'finalizado'){
    statusHTML = `<span class="badge done">Finalizado</span>`;
  } else {
    statusHTML = `<span class="kickoff">${ev.allDay ? '--:--' : fmtTime(ev.startISO)}</span>`;
  }
  const progressHTML = st.state === 'en_vivo'
    ? `<div class="progress"><i style="width:${st.pct.toFixed(0)}%"></i></div>` : '';

  return `<div class="match ${st.state === 'finalizado' ? 'finalizado':''}" style="--comp-color:${ev.cal.color}">
    <img class="logo" src="${ev.cal.logo}" alt="" onerror="this.style.display='none'">
    <div class="info">
      <div class="comp">${ev.cal.label}</div>
      <div class="title">${ev.title}</div>
      ${progressHTML}
    </div>
    <div class="status">${statusHTML}</div>
  </div>`;
}

function renderHero(todayKey, todayMeta){
  const grid = document.getElementById('heroGrid');
  document.getElementById('heroSub').textContent = `${todayMeta.label}, ${todayMeta.shortDate}`;

  const todays = CACHE.events
    .filter(e => dateKeyBogota(e.startISO) === todayKey)
    .map(e => ({ e, st: matchStatus(e) }))
    .sort((a,b) => {
      const order = { en_vivo:0, programado:1, finalizado:2 };
      if(order[a.st.state] !== order[b.st.state]) return order[a.st.state]-order[b.st.state];
      return new Date(a.e.startISO) - new Date(b.e.startISO);
    });

  if(todays.length === 0){
    grid.innerHTML = `<div class="emptyState">No hay partidos programados para hoy.</div>`;
    return;
  }
  grid.innerHTML = todays.map(({e}) => matchCardHTML(e, true)).join('');
}

function renderWeek(days){
  const el = document.getElementById('weekSection');
  const rest = days.slice(1); // todos menos hoy
  el.innerHTML = rest.map(d => {
    const matches = CACHE.events
      .filter(e => dateKeyBogota(e.startISO) === d.key)
      .sort((a,b) => new Date(a.startISO) - new Date(b.startISO));
    const body = matches.length
      ? matches.map(e => matchCardHTML(e, false)).join('')
      : `<div class="emptyState" style="padding:14px;">Sin partidos</div>`;
    return `<div class="weekDayRow">
      <div class="dayName">${d.label}<small>${d.shortDate}</small></div>
      <div class="weekMatches">${body}</div>
    </div>`;
  }).join('');
}

function renderClock(){
  const now = bogotaNow();
  document.getElementById('clockTime').textContent =
    now.toLocaleTimeString('es-CO', { timeZone: CONFIG.TIMEZONE, hour12:false });
  document.getElementById('clockDate').textContent =
    `${WD_NAMES[weekdayIndexBogota(now)]} ${fmtDayShort(now)}`;
}

function renderAll(){
  const days = buildDayList();
  renderTicker(days);
  renderHero(days[0].key, days[0]);
  renderWeek(days);
}

/* =========================================================
   CICLO DE VIDA: carga, refresco y rotación de día
   ========================================================= */
let currentDayKey = dateKeyBogota(bogotaNow());

async function loadEvents(){
  const statusLine = document.getElementById('statusLine');
  try{
    const { events, errors } = await fetchAllEvents();
    CACHE.events = events;
    renderAll();
    const stamp = bogotaNow().toLocaleTimeString('es-CO', { timeZone: CONFIG.TIMEZONE, hour12:false });
    statusLine.textContent = errors.length
      ? `Actualizado ${stamp} · ${errors.length} calendario(s) con error (ver consola)`
      : `Actualizado ${stamp} · ${events.length} partidos cargados`;
    if(errors.length) console.warn('Errores de calendario:', errors);
  }catch(err){
    console.error(err);
    statusLine.textContent = 'Error al cargar calendarios. Revisa la API key y los permisos.';
  }
}

function tick(){
  renderClock();
  // recalcula estados en vivo/finalizado sin volver a pedir datos a Google
  renderAll();

  const nowKey = dateKeyBogota(bogotaNow());
  if(nowKey !== currentDayKey){
    currentDayKey = nowKey;
    if(CONFIG.RELOAD_AT_MIDNIGHT){
      location.reload();
    } else {
      loadEvents();
    }
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadEvents);

loadEvents();
renderClock();
setInterval(tick, CONFIG.TICK_MS);
setInterval(loadEvents, CONFIG.REFRESH_EVENTS_MS);
</script>
</body>
</html>
