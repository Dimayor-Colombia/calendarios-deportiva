<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DIMAYOR · Board de Partidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#05070d;
    --line:rgba(255,255,255,0.09);
    --text-hi:#f5f7ff;
    --text-lo:#8a92ad;
    --yellow:#f3cc23;
    --card-bg:rgba(255,255,255,0.035);
    --s:1; /* factor de escala de cada columna, lo ajusta el JS si hace falta */
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%; margin:0; padding:0;
    overflow:hidden; /* nunca debe aparecer scroll: es para SmartTV */
    background:
      radial-gradient(1200px 700px at 10% -15%, rgba(6,42,99,0.55), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(243,204,35,0.06), transparent 55%),
      var(--bg-0);
    color:var(--text-hi);
    font-family:'Barlow', sans-serif;
  }
  h1,.dayName,.kickoff{font-family:'Barlow Condensed', sans-serif;}

  .board{height:100vh; height:100dvh; display:flex; flex-direction:column;}

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 22px; border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--yellow);
    box-shadow:0 0 10px var(--yellow); animation:pulse 1.6s infinite;}
  .brand h1{font-size:20px; font-weight:700; letter-spacing:0.5px; margin:0; text-transform:uppercase;}
  .brand h1 span{color:var(--yellow);}
  .clock{font-size:13px; color:var(--text-lo); letter-spacing:0.5px; text-align:right;}
  .clock b{color:var(--text-hi); font-variant-numeric:tabular-nums;}

  /* ---------- Grid de 7 días ---------- */
  .grid{
    flex:1 1 auto; min-height:0;
    display:grid; grid-template-columns:repeat(7, 1fr);
    gap:8px; padding:8px 10px;
  }
  .dayCol{
    min-height:0; display:flex; flex-direction:column;
    background:var(--card-bg); border:1px solid var(--line); border-radius:12px;
    overflow:hidden;
  }
  .dayCol.today{
    border-color:rgba(243,204,35,0.6);
    box-shadow:0 0 0 1px rgba(243,204,35,0.15) inset, 0 0 24px rgba(243,204,35,0.08);
    background:linear-gradient(180deg, rgba(243,204,35,0.08), rgba(255,255,255,0.03));
  }
  .dayHead{
    flex:0 0 auto; text-align:center; padding:7px 4px 6px;
    border-bottom:1px solid var(--line);
  }
  .dayHead .wd{font-size:15px; text-transform:uppercase; letter-spacing:1px; font-weight:600;}
  .dayCol.today .dayHead .wd{color:var(--yellow);}
  .dayHead .dt{font-size:10px; color:var(--text-lo);}

  .matches{
    flex:1 1 auto; min-height:0; overflow:hidden;
    display:flex; flex-direction:column; gap:calc(5px * var(--s));
    padding:calc(6px * var(--s)) calc(6px * var(--s)) calc(8px * var(--s));
  }

  .emptyState{
    margin:auto; color:var(--text-lo); font-size:12px; text-align:center; padding:10px;
  }

  /* ---------- Tarjeta de partido ---------- */
  .match{
    position:relative; background:rgba(255,255,255,0.03);
    border:1px solid var(--line); border-left:calc(3px * var(--s)) solid var(--comp-color, #444);
    border-radius:calc(8px * var(--s));
    padding:calc(6px * var(--s)) calc(8px * var(--s));
  }
  .match.finalizado{opacity:.45;}
  .match .comp{
    font-size:calc(8.5px * var(--s)); letter-spacing:.5px; text-transform:uppercase;
    color:var(--text-lo); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:flex; align-items:center; gap:4px; margin-bottom:2px;
  }
  .match .comp img{width:calc(12px * var(--s)); height:calc(12px * var(--s)); object-fit:contain; border-radius:3px; flex:0 0 auto;}
  .match .title{
    font-size:calc(12.5px * var(--s)); font-weight:600; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .match .row2{display:flex; align-items:center; justify-content:space-between; margin-top:calc(3px * var(--s));}
  .kickoff{font-size:calc(13px * var(--s)); font-weight:700; font-variant-numeric:tabular-nums; color:var(--text-hi);}

  .badge{
    display:inline-flex; align-items:center; gap:4px;
    font-size:calc(9px * var(--s)); font-weight:700; letter-spacing:.5px;
    padding:calc(2px * var(--s)) calc(6px * var(--s)); border-radius:20px; text-transform:uppercase;
  }
  .badge.live{background:rgba(230,72,60,0.18); color:#ff6a5c;}
  .badge.live .dot{width:5px;height:5px;border-radius:50%;background:#ff6a5c; animation:pulse 1s infinite;}
  .badge.done{background:rgba(255,255,255,0.06); color:var(--text-lo);}

  .progress{height:2px; border-radius:3px; background:rgba(255,255,255,0.08); margin-top:calc(4px * var(--s)); overflow:hidden;}
  .progress i{display:block; height:100%; background:#ff6a5c;}

  .moreChip{
    text-align:center; font-size:11px; color:var(--text-lo);
    padding:4px; border:1px dashed var(--line); border-radius:8px; flex:0 0 auto;
  }

  footer{
    flex:0 0 auto; display:flex; justify-content:space-between; align-items:center;
    padding:4px 18px; color:var(--text-lo); font-size:11px; border-top:1px solid var(--line);
  }

  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}

  @media (max-width:900px){
    .grid{grid-template-columns:repeat(7,1fr); gap:4px; padding:4px;}
    .dayHead .wd{font-size:11px;}
    .match .title{font-size:calc(10px * var(--s));}
  }
</style>
</head>
<body>
<div class="board">
  <header>
    <div class="brand">
      <span class="dot"></span>
      <h1>DIMAYOR <span>· BOARD</span></h1>
    </div>
    <div class="clock">Hoy <b id="clockDate">--</b> · <b id="clockTime">--:--:--</b></div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <span id="statusLine">Iniciando…</span>
    <span id="refreshHint">Se actualiza solo</span>
  </footer>
</div>

<script>
/* =========================================================
   CONFIGURACIÓN
   ========================================================= */
const CONFIG = {
  API_KEY: 'AIzaSyC2oQ0Y7RYZX_lgkgPIchochLltCnN78nc',
  TIMEZONE: 'America/Bogota',
  DAYS_AHEAD: 7,
  REFRESH_EVENTS_MS: 3 * 60 * 1000,
  TICK_MS: 20 * 1000,
  MATCH_DURATION_MIN: 130,
  RELOAD_AT_MIDNIGHT: true,
  MIN_SCALE: 0.55   // qué tanto se puede encoger una columna antes de empezar a recortar partidos
};

const CALENDARS = [
  { id: 'c_74d60f90f8e2a5d566429af24fd4c5e4c6a083e5a62027cec34a5c362b8dd49a@group.calendar.google.com', label: 'Liga BetPlay Dimayor', color: '#f3cc23', logo: 'https://lh3.googleusercontent.com/d/1tVCRbR0BNTcSqzoDd0jgs_9dvrvYK2pX' },
  { id: 'c_b440f465efac86a96197d6c92dcdc371f00f55c22b201b5e4bdb446aa1d558e0@group.calendar.google.com', label: 'Torneo BetPlay Dimayor', color: '#6fb2e3', logo: 'https://lh3.googleusercontent.com/d/1t64NZwLCkCo4ofMZVYzhfcV8pSsVwCfv' },
  { id: 'c_f4e132b3db024af62da58634ae149e2baabbe282f113c0f7d9ddea1ffe67d42f@group.calendar.google.com', label: 'Copa BetPlay Dimayor', color: '#3bad4c', logo: 'https://lh3.googleusercontent.com/d/1TELaujxqcd_Q_I3HwUxriPuUuwOx2Wrl' },
  { id: 'c_d95f7411f89d37a29d9135d9b963cb157e2c0e8ca5971cfe34320415fa6d9254@group.calendar.google.com', label: 'Superliga BetPlay Dimayor', color: '#062a63', logo: 'https://lh3.googleusercontent.com/d/1UJxk_10wBGXLNs5_gaVFI6xmUkT47uYq' },
  { id: 'c_4317288379f78b336a1509f4f6f678aad84d2b08c72797d268346ea2122beb79@group.calendar.google.com', label: 'Liga Femenina BetPlay Dimayor', color: '#b51a65', logo: 'https://lh3.googleusercontent.com/d/1GRGoELSTVM2sDydzsswzi6XvjCDxK84y' },
  { id: 'c_c51065fa3d2f6c30997d0480ee6168233541fa6d80f79e989c70649a83655fad@group.calendar.google.com', label: 'Otras competiciones', color: '#9aa0ad', logo: 'https://lh3.googleusercontent.com/d/1nAOaOA7FCdprzPq6LBwuqTEHVEAQpRzU' },
  { id: 'c_b9881758c97c62967ca1e1638d560af12815ed0262b6bf7d7afc2d910b7cf03a@group.calendar.google.com', label: 'CONMEBOL Libertadores', color: '#c9a227', logo: 'https://lh3.googleusercontent.com/d/1iRkeR307HOxDvVcV8u_IKMkZ3_b0GAye' },
  { id: 'c_353a23183eccc44a15047f4aa971ca96526a53f16170a1b69e0357d2c324c10c@group.calendar.google.com', label: 'CONMEBOL Sudamericana', color: '#c23b3b', logo: 'https://lh3.googleusercontent.com/d/1rJQeeoIs9SMrNyuLhVvJCFOtgR9Hq5FE' },
  { id: '4de747g9v5rqo0ohmj87j4sf1fg9m2c8@import.calendar.google.com', label: 'Copa Mundial de la FIFA 2026', color: '#2fb8a6', logo: 'https://lh3.googleusercontent.com/d/1Td-x8UWchJUcFPqIPhxfYJlWzpvF6t9u' }
];

/* =========================================================
   HELPERS DE FECHA (todo en America/Bogota)
   ========================================================= */
const WD_MAP = { Mon:0, Tue:1, Wed:2, Thu:3, Fri:4, Sat:5, Sun:6 };
const WD_NAMES = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function bogotaNow(){ return new Date(new Date().toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE })); }
function dateKeyBogota(d){ return new Date(d).toLocaleDateString('en-CA', { timeZone: CONFIG.TIMEZONE }); }
function weekdayIndexBogota(d){
  const short = new Date(d).toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE, weekday:'short' });
  return WD_MAP[short];
}
function fmtTime(d){
  return new Date(d).toLocaleTimeString('es-CO', { timeZone: CONFIG.TIMEZONE, hour:'2-digit', minute:'2-digit', hour12:false });
}
function fmtDayShort(d){
  const dt = new Date(d);
  const day = dt.toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE, day:'2-digit' });
  const monthIdx = Number(dt.toLocaleString('en-US', { timeZone: CONFIG.TIMEZONE, month:'numeric' })) - 1;
  return `${day} ${MESES[monthIdx]}`;
}
function buildDayList(){
  const now = bogotaNow();
  const days = [];
  for(let i=0;i<CONFIG.DAYS_AHEAD;i++){
    const d = new Date(now);
    d.setDate(d.getDate()+i);
    days.push({
      key: dateKeyBogota(d),
      label: WD_NAMES[weekdayIndexBogota(d)],
      shortDate: fmtDayShort(d),
      isToday: i===0
    });
  }
  return days;
}

/* =========================================================
   CARGA DE EVENTOS
   ========================================================= */
async function fetchCalendarEvents(cal, timeMinISO, timeMaxISO){
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events`
    + `?key=${encodeURIComponent(CONFIG.API_KEY)}`
    + `&singleEvents=true&orderBy=startTime`
    + `&timeMin=${encodeURIComponent(timeMinISO)}`
    + `&timeMax=${encodeURIComponent(timeMaxISO)}`
    + `&timeZone=${encodeURIComponent(CONFIG.TIMEZONE)}`;
  const res = await fetch(url);
  if(!res.ok){
    const body = await res.text().catch(()=> '');
    throw new Error(`${cal.label}: HTTP ${res.status} ${body.slice(0,120)}`);
  }
  const data = await res.json();
  return (data.items || [])
    .filter(ev => ev.status !== 'cancelled')
    .map(ev => ({
      id: ev.id,
      title: ev.summary || 'Partido',
      startISO: ev.start.dateTime || ev.start.date,
      endISO: ev.end ? (ev.end.dateTime || null) : null,
      allDay: !ev.start.dateTime,
      cal
    }));
}
async function fetchAllEvents(){
  const now = bogotaNow();
  const timeMin = new Date(now); timeMin.setHours(0,0,0,0);
  const timeMax = new Date(now); timeMax.setDate(timeMax.getDate()+CONFIG.DAYS_AHEAD); timeMax.setHours(23,59,59,999);
  const results = await Promise.allSettled(
    CALENDARS.map(cal => fetchCalendarEvents(cal, timeMin.toISOString(), timeMax.toISOString()))
  );
  const events = []; const errors = [];
  results.forEach((r, idx) => {
    if(r.status === 'fulfilled') events.push(...r.value);
    else errors.push(CALENDARS[idx].label + ': ' + r.reason.message);
  });
  return { events, errors };
}

/* =========================================================
   ESTADO DE PARTIDO
   ========================================================= */
function matchStatus(ev){
  const start = new Date(ev.startISO);
  const end = ev.endISO ? new Date(ev.endISO) : new Date(start.getTime() + CONFIG.MATCH_DURATION_MIN*60000);
  const now = new Date();
  if(ev.allDay) return { state:'programado', start, end, pct:0 };
  if(now < start) return { state:'programado', start, end, pct:0 };
  if(now >= start && now < end) return { state:'en_vivo', start, end, pct: Math.min(100, ((now-start)/(end-start))*100) };
  return { state:'finalizado', start, end, pct:100 };
}
const STATE_ORDER = { en_vivo:0, programado:1, finalizado:2 };

/* =========================================================
   RENDER
   ========================================================= */
let CACHE = { events: [] };

function matchCardHTML(ev){
  const st = matchStatus(ev);
  let statusHTML;
  if(st.state === 'en_vivo') statusHTML = `<span class="badge live"><span class="dot"></span>Vivo</span>`;
  else if(st.state === 'finalizado') statusHTML = `<span class="badge done">Fin</span>`;
  else statusHTML = `<span class="kickoff">${ev.allDay ? '--:--' : fmtTime(ev.startISO)}</span>`;
  const progressHTML = st.state === 'en_vivo'
    ? `<div class="progress"><i style="width:${st.pct.toFixed(0)}%"></i></div>` : '';

  return `<div class="match ${st.state === 'finalizado' ? 'finalizado':''}" style="--comp-color:${ev.cal.color}">
    <div class="comp"><img src="${ev.cal.logo}" alt="" onerror="this.style.display='none'">${ev.cal.label}</div>
    <div class="title">${ev.title}</div>
    <div class="row2">${statusHTML}</div>
    ${progressHTML}
  </div>`;
}

function eventsForDay(key){
  return CACHE.events
    .filter(e => dateKeyBogota(e.startISO) === key)
    .map(e => ({ e, st: matchStatus(e) }))
    .sort((a,b) => {
      if(STATE_ORDER[a.st.state] !== STATE_ORDER[b.st.state]) return STATE_ORDER[a.st.state]-STATE_ORDER[b.st.state];
      return new Date(a.e.startISO) - new Date(b.e.startISO);
    })
    .map(x => x.e);
}

function renderGrid(days){
  const grid = document.getElementById('grid');
  grid.innerHTML = days.map(d => `
    <section class="dayCol ${d.isToday ? 'today':''}" data-key="${d.key}">
      <div class="dayHead">
        <div class="wd">${d.label}</div>
        <div class="dt">${d.shortDate}</div>
      </div>
      <div class="matches" id="matches-${d.key}"></div>
    </section>
  `).join('');

  days.forEach(d => fillColumn(d.key));
}

// Llena una columna y, si no cabe en la pantalla, la encoge y si aún así
// no cabe, recorta primero los partidos ya finalizados (nunca los que están en vivo).
function fillColumn(key){
  const col = document.getElementById(`matches-${key}`);
  const all = eventsForDay(key);

  if(all.length === 0){
    col.style.setProperty('--s', 1);
    col.innerHTML = `<div class="emptyState">Sin partidos</div>`;
    return;
  }

  let visible = all.slice();
  let scale = 1;

  const render = () => {
    col.style.setProperty('--s', scale.toFixed(2));
    const hiddenCount = all.length - visible.length;
    col.innerHTML = visible.map(matchCardHTML).join('')
      + (hiddenCount > 0 ? `<div class="moreChip">+${hiddenCount} más</div>` : '');
  };

  render();

  let guard = 0;
  while(col.scrollHeight > col.clientHeight && guard < 60){
    guard++;
    if(scale > CONFIG.MIN_SCALE){
      scale = Math.max(CONFIG.MIN_SCALE, scale - 0.05);
    } else if(visible.length > 1){
      // recorta desde el final (los finalizados quedan al final por el orden ya aplicado)
      visible = visible.slice(0, -1);
    } else {
      break;
    }
    render();
  }
}

function renderClock(){
  const now = bogotaNow();
  document.getElementById('clockTime').textContent =
    now.toLocaleTimeString('es-CO', { timeZone: CONFIG.TIMEZONE, hour12:false });
  document.getElementById('clockDate').textContent =
    `${WD_NAMES[weekdayIndexBogota(now)]} ${fmtDayShort(now)}`;
}

function renderAll(){
  renderGrid(buildDayList());
}

/* =========================================================
   CICLO DE VIDA
   ========================================================= */
let currentDayKey = dateKeyBogota(bogotaNow());

async function loadEvents(){
  const statusLine = document.getElementById('statusLine');
  try{
    const { events, errors } = await fetchAllEvents();
    CACHE.events = events;
    renderAll();
    const stamp = bogotaNow().toLocaleTimeString('es-CO', { timeZone: CONFIG.TIMEZONE, hour12:false });
    statusLine.textContent = errors.length
      ? `Actualizado ${stamp} · ${errors.length} calendario(s) con error`
      : `Actualizado ${stamp} · ${events.length} partidos`;
    if(errors.length) console.warn('Errores de calendario:', errors);
  }catch(err){
    console.error(err);
    statusLine.textContent = 'Error al cargar calendarios. Revisa la API key y los permisos.';
  }
}

function tick(){
  renderClock();
  renderAll();
  const nowKey = dateKeyBogota(bogotaNow());
  if(nowKey !== currentDayKey){
    currentDayKey = nowKey;
    if(CONFIG.RELOAD_AT_MIDNIGHT) location.reload();
    else loadEvents();
  }
}

window.addEventListener('resize', renderAll);

loadEvents();
renderClock();
setInterval(tick, CONFIG.TICK_MS);
setInterval(loadEvents, CONFIG.REFRESH_EVENTS_MS);
</script>
</body>
</html>
